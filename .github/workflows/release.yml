name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MCP_ARCHIVE="obsidian-mcp-${VERSION}-${{ matrix.target }}.tar.gz"
          DAEMON_ARCHIVE="obsidian-semanticd-${VERSION}-${{ matrix.target }}.tar.gz"
          tar -czf "$MCP_ARCHIVE" -C target/${{ matrix.target }}/release obsidian-mcp
          tar -czf "$DAEMON_ARCHIVE" -C target/${{ matrix.target }}/release obsidian-semanticd

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "$env:GITHUB_REF_NAME" -replace '^v', ''
          $MCP_ARCHIVE = "obsidian-mcp-${VERSION}-${{ matrix.target }}.zip"
          $DAEMON_ARCHIVE = "obsidian-semanticd-${VERSION}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/obsidian-mcp.exe" -DestinationPath $MCP_ARCHIVE
          Compress-Archive -Path "target/${{ matrix.target }}/release/obsidian-semanticd.exe" -DestinationPath $DAEMON_ARCHIVE

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            obsidian-mcp-*-${{ matrix.target }}.*
            obsidian-semanticd-*-${{ matrix.target }}.*

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect archives
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} release/ \;

      - name: Generate checksums
        working-directory: release
        run: sha256sum * > checksums.sha256

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*

  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
