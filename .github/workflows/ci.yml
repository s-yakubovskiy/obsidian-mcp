name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Rustfmt
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --check

      - name: Cargo audit
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cargo-audit && cargo audit

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Tests
        run: cargo test

  daemon-integration:
    name: daemon integration (embeddings)
    runs-on: ubuntu-latest
    env:
      FASTEMBED_CACHE_DIR: ${{ github.workspace }}/.fastembed_cache
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-daemon-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-daemon-cargo-

      - name: Cache fastembed model artifacts
        uses: actions/cache@v5
        with:
          path: .fastembed_cache
          key: ubuntu-fastembed-cache-v1-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-fastembed-cache-v1-

      - name: Daemon integration tests
        run: cargo test --features embeddings --test daemon_integration_tests
